[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "landgen"
version = "0.1.0"
description = "Landgen preprocesses source land data to 1km grid for use by mksurfdata"
readme = "README.md"
license = {text = "????"}
authors = [
    { name = "Alan Di Vittorio", email = "avdivittorio@lbl.gov" },
    { name = "Eva Sinha", email = "eva.sinha@pnnl.gov" },
    { name = "add rest of folks", email = "your_email@example.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: BSD License",
    "Programming Language :: Python :: 3",
    "Operating System :: Unix",
]
dependencies = [
    # List your project dependencies here (e.g., "numpy >= 1.20")
]

[project.urls]
Homepage = "https://github.com"
Source = "https://github.com"
Tracker = "https://github.com/issues"

[tool.hatch.metadata]
# Tells Hatch to find packages under the 'src' directory
# (or use the equivalent for your chosen build backend like setuptools)
packages = ["src"]
