%YAML 1.1
---
driver_options:
  atmosphere_dag_verbosity_level: 5

time_stepping:
  time_step: ${ATM_TIME_STEP}
  run_t0: ${RUN_T0}
  number_of_steps: ${NUM_STEPS}

atmosphere_processes:
  atm_procs_list: [ace]
  ace:
    m_forward_steps: 1
    m_forward_steps_in_memory: 1
grids_manager:
  Type: Mesh Free
  grids_names: [Point Grid]
  Point Grid:
    aliases: [Physics]
    type: point_grid
    number_of_global_columns:   3
    number_of_vertical_levels:  128

initial_conditions:
  cldfrac_liq: 0.0
  qi: 0.0
...
