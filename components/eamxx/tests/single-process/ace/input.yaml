%YAML 1.1
---
driver_options:
  atmosphere_dag_verbosity_level: 5

time_stepping:
  time_step: ${ATM_TIME_STEP}
  run_t0: ${RUN_T0}
  number_of_steps: ${NUM_STEPS}

atmosphere_processes:
  atm_procs_list: [ace]
  ace:
    forward_steps: 1
    forward_steps_in_memory: 1
    checkpoint_path: /pscratch/sd/m/mahf708/emulator/ace_ckpt_traced${GPU_OR_CPU}.tar
grids_manager:
  Type: Mesh Free
  grids_names: [Point Grid]
  Point Grid:
    aliases: [Physics]
    type: point_grid
    number_of_global_columns:   360
    number_of_vertical_levels:  180

initial_conditions:
  landfrac: 0.5
  InField: 0.1

# The parameters for I/O control
# Scorpio:
  # output_yaml_files: ["output.yaml"]
...
